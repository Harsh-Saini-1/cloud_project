<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secure File Upload Portal</title>
  <meta name="description" content="Securely upload files to the cloud using our encrypted, pre-signed URL-based file transfer portal." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Animated background blobs -->
  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>
  <div class="bg-blob blob-3"></div>

  <main class="portal-wrapper" role="main">

    <!-- Header -->
    <header class="portal-header">
      <div class="shield-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L3 7V12C3 16.55 7.84 20.74 12 22C16.16 20.74 21 16.55 21 12V7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
          <path d="M9 12L11 14L15 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h1 class="portal-title">Secure File Upload Portal</h1>
      <p class="portal-subtitle">Files are encrypted in transit and stored securely on AWS S3</p>
    </header>

    <!-- Upload Card -->
    <section class="upload-card" aria-label="File Upload Section">

      <!-- Drop Zone -->
      <div
        id="drop-zone"
        class="drop-zone"
        role="button"
        tabindex="0"
        aria-label="Drag and drop files here, or click to select"
      >
        <div class="drop-zone-inner">
          <div class="upload-icon-wrapper" aria-hidden="true">
            <svg class="upload-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M21 15V19C21 20.1 20.1 21 19 21H5C3.9 21 3 20.1 3 19V15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <polyline points="17 8 12 3 7 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <line x1="12" y1="3" x2="12" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
          <p class="drop-text-primary">Drag &amp; drop your file here</p>
          <p class="drop-text-secondary">or <span class="browse-link">browse to choose a file</span></p>
          <p class="drop-text-hint">Supports any file type &middot; Max 5 GB</p>
        </div>

        <!-- Hidden real file input -->
        <input
          type="file"
          id="file-input"
          class="file-input-hidden"
          aria-label="Select file"
        />
      </div>

      <!-- Selected File Preview -->
      <div id="file-preview" class="file-preview hidden" aria-live="polite" aria-atomic="true">
        <div class="file-preview-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M14 2H6C4.9 2 4 2.9 4 4V20C4 21.1 4.9 22 6 22H18C19.1 22 20 21.1 20 20V8L14 2Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            <polyline points="14 2 14 8 20 8" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="file-preview-info">
          <span id="file-name" class="file-name"></span>
          <span id="file-size" class="file-size"></span>
        </div>
        <button id="remove-file-btn" class="remove-file-btn" aria-label="Remove selected file" title="Remove file">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <line x1="18" y1="6" x2="6" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="6" y1="6" x2="18" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <!-- Progress Bar -->
      <div id="progress-container" class="progress-container hidden" aria-label="Upload progress" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
        <div class="progress-header">
          <span class="progress-label">Uploading...</span>
          <span id="progress-percent" class="progress-percent">0%</span>
        </div>
        <div class="progress-bar-track">
          <div id="progress-bar" class="progress-bar-fill"></div>
        </div>
      </div>

      <!-- Upload Button -->
      <button
        id="upload-btn"
        class="upload-btn"
        disabled
        aria-label="Upload file to secure storage"
      >
        <span id="upload-btn-icon" class="btn-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M21 15V19C21 20.1 20.1 21 19 21H5C3.9 21 3 20.1 3 19V15" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            <polyline points="17 8 12 3 7 8" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            <line x1="12" y1="3" x2="12" y2="15" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
        </span>
        <!-- Spinner (shown during upload) -->
        <span id="upload-btn-spinner" class="btn-spinner hidden" aria-hidden="true">
          <svg class="spinner-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-dasharray="31.4 31.4" />
          </svg>
        </span>
        <span id="upload-btn-text" class="btn-text">Upload Securely</span>
      </button>

      <!-- Status Message -->
      <div id="status-msg" class="status-msg hidden" role="alert" aria-live="assertive"></div>

    </section>

    <!-- Security Badges -->
    <footer class="security-badges" aria-label="Security features">
      <div class="badge">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="3" y="11" width="18" height="11" rx="2" stroke="currentColor" stroke-width="2"/>
          <path d="M7 11V7C7 4.24 9.24 2 12 2C14.76 2 17 4.24 17 7V11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span>End-to-End Encrypted</span>
      </div>
      <div class="badge">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M12 2L3 7V12C3 16.55 7.84 20.74 12 22C16.16 20.74 21 16.55 21 12V7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
        </svg>
        <span>AWS S3 Secured</span>
      </div>
      <div class="badge">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Pre-signed URL Transfer</span>
      </div>
    </footer>

  </main>

  <script src="app.js"></script>
</body>
</html>
